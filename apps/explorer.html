<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; 
            padding: 20px; margin: 0;
        }
        .sidebar {
            width: 150px; border-right: 1px solid #222;
            float: left; height: 100vh;
        }
        .main-view { margin-left: 170px; }
        .storage-info {
            background: #0a0a0a; padding: 10px;
            border-radius: 8px; border: 1px solid var(--primary-color, #9d00ff);
            margin-bottom: 20px; font-size: 12px;
        }
        .file-list { width: 100%; border-collapse: collapse; }
        .file-list th { text-align: left; color: #9d00ff; border-bottom: 1px solid #222; padding: 10px; }
        .file-list td { padding: 10px; border-bottom: 1px solid #111; font-size: 14px; }
        .btn-back { color: #9d00ff; cursor: pointer; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <span class="btn-back" onclick="window.parent.postMessage({type: 'CLOSE'}, '*')">← Exit Explorer</span>

    <div class="sidebar">
        <p style="color: #9d00ff; font-size: 12px;">DEVICES</p>
        <div style="padding: 10px 0;">💾 Local Disk (V:)</div>
        <div style="padding: 10px 0; opacity: 0.5;">💿 Cloud Link</div>
    </div>

    <div class="main-view">
        <div class="storage-info">
            <strong>Storage Unit:</strong> DRIVE_01 <br>
            <strong>Serial Number:</strong> AEON-9902-X <br>
            <strong>Status:</strong> 76.4 Petabytes
        </div>

        <table class="file-list">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Size</th>
                </tr>
            </thead>
            <tbody id="file-table">
                <tr>
                    <td>System_Log.txt</td>
                    <td>Text Document</td>
                    <td>1.2 KB</td>
                </tr>
                <tr>
                    <td>User_Profile.sys</td>
                    <td>System File</td>
                    <td>0.5 KB</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // Sync color with main OS
        window.addEventListener('message', (e) => {
            if (e.data.type === 'SET_COLOR') {
                document.documentElement.style.setProperty('--primary-color', e.data.value);
            }
        });
    </script>
</body>
</html>
