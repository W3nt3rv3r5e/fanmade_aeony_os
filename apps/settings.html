<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: #000; color: #9d00ff; font-family: sans-serif; 
            padding: 25px; overflow: hidden;
        }
        .card { 
            background: #080808; border: 1px solid #222; 
            padding: 20px; border-radius: 12px; margin-top: 20px;
        }
        input[type="color"] { 
            background: none; border: 1px solid #444; 
            width: 50px; height: 50px; cursor: pointer; 
        }
        .btn-back { color: #fff; cursor: pointer; text-decoration: underline; font-size: 14px; }
    </style>
</head>
<body>
    <div class="btn-back" onclick="window.parent.postMessage({type: 'CLOSE'}, '*')">← Back to Desktop</div>
    
    <h2>System Settings</h2>
    
    <div class="card">
        <p>Personalization</p><br>
        <label>Accent Color: </label>
        <input type="color" onchange="update(this.value)" value="#9d00ff">
    </div>

    <script>
        function update(color) {
            window.parent.postMessage({type: 'SET_COLOR', value: color}, '*');
        }
    </script>
</body>
</html>
