<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AeonyOS</title>
    <!-- Fixed Asset Path -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    
    <style>
        :root {
            --primary-color: #9d00ff;
            --bg-color: #000000;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none;
            /* Fixed Cursor Path */
            cursor: url("cursor.svg"), auto !important;
        }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: var(--bg-color);
            color: white; font-family: 'Segoe UI', sans-serif;
        }

        #desktop { 
            height: calc(100vh - 80px); padding: 40px; 
            display: grid; grid-template-columns: repeat(auto-fill, 110px);
            grid-template-rows: repeat(auto-fill, 120px); gap: 20px;
        }

        .desktop-icon {
            width: 100px; height: 110px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 10px;
            border-radius: 18px; transition: 0.2s;
        }

        .desktop-icon:hover { background: rgba(157, 0, 255, 0.15); border: 1px solid rgba(157, 0, 255, 0.3); }
        .emoji-icon { font-size: 42px; filter: drop-shadow(0 0 8px var(--primary-color)); }
        .desktop-icon span { font-size: 13px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* Window System */
        #app-window {
            position: absolute; top: 10%; left: 10%;
            width: 80%; height: 75%;
            background: #000; border: 1px solid var(--primary-color);
            border-radius: 12px; display: none; flex-direction: column;
            z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        #app-window.active { display: flex; }
        .window-header {
            padding: 12px 20px; background: #0a0a0a;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .close-btn { color: #ff4444; cursor: pointer; font-size: 24px; font-weight: bold; }
        iframe { border: none; flex-grow: 1; background: transparent; }

        /* Taskbar Pill */
        #taskbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            height: 55px; width: 260px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--primary-color);
            border-radius: 100px; display: flex; align-items: center;
            justify-content: space-evenly; z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .nav-btn { font-size: 22px; cursor: pointer; transition: 0.3s; }
        .nav-btn:hover { transform: scale(1.2); filter: drop-shadow(0 0 5px var(--primary-color)); }
    </style>
</head>
<body>

    <div id="desktop">
        <!-- External Apps (Redirect) -->
        <div class="desktop-icon" onclick="launch('https://grok.com', true)">
            <div class="emoji-icon">🌙</div>
            <span>Grok</span>
        </div>
        <div class="desktop-icon" onclick="launch('https://gamejolt.com', true)">
            <div class="emoji-icon">⚡</div>
            <span>Game Jolt</span>
        </div>
        <div class="desktop-icon" onclick="launch('https://play.fancade.com', true)">
            <div class="emoji-icon">👾</div>
            <span>Fancade</span>
        </div>
        <!-- Internal Apps (Window) -->
        <div class="desktop-icon" onclick="launch('apps/settings.html', false)">
            <div class="emoji-icon">⚙️</div>
            <span>Settings</span>
        </div>
        <div class="desktop-icon" onclick="launch('apps/explorer.html', false)">
            <div class="emoji-icon">📁</div>
            <span>Explorer</span>
        </div>
        <div class="desktop-icon" onclick="launch('https://w3nt3rv3r5e.github.io/W3nt3rv3r5e/', true)">
            <div class="emoji-icon">🌌</div>
            <span>W3nt3rv3r5e</span>
        </div>
    </div>

    <div id="app-window">
        <div class="window-header">
            <span id="win-title">System App</span>
            <span class="close-btn" onclick="closeApp()">×</span>
        </div>
        <iframe id="win-frame"></iframe>
    </div>

    <div id="taskbar">
        <div class="nav-btn" onclick="location.reload()">🌀</div>
        <div class="nav-btn" onclick="closeApp()">🏠</div>
        <div class="nav-btn" onclick="launch('apps/settings.html', false)">⚙️</div>
    </div>

    <script>
        function launch(url, isExternal) {
            if (isExternal) {
                // Fix: Redirecting to avoid Iframe blocking bugs
                window.location.href = url;
            } else {
                // Open system apps in the custom window
                document.getElementById('win-frame').src = url;
                document.getElementById('app-window').classList.add('active');
            }
        }

        function closeApp() {
            document.getElementById('app-window').classList.remove('active');
            document.getElementById('win-frame').src = '';
        }

        // Listen for accent color changes from settings.html
        window.addEventListener('message', (e) => {
            if (e.data.type === 'SET_COLOR') {
                document.documentElement.style.setProperty('--primary-color', e.data.value);
            }
            if (e.data.type === 'CLOSE') closeApp();
        });
    </script>
</body>
</html>
