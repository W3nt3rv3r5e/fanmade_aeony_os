<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AeonyOS - Zenith (Admin)</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <style>
        :root {
            --primary-color: #9d00ff; /* Neon Violet */
            --bg-color: #0a0015;
            --menu-bg: rgba(15, 0, 30, 0.98);
        }

        * {
            cursor: url("cursor.svg"), auto !important;
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: linear-gradient(135deg, #0f0020 0%, #000000 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
        }

        #fps-counter {
            position: fixed; top: 10px; right: 10px;
            color: var(--primary-color); font-family: monospace;
            font-size: 12px; z-index: 9999;
            background: rgba(0,0,0,0.5); padding: 4px 8px;
            border: 1px solid var(--primary-color);
        }

        /* Gesture Pill Taskbar */
        #taskbar {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            height: 50px; min-width: 120px;
            background: rgba(10, 0, 20, 0.9);
            border: 1px solid var(--primary-color);
            display: flex; align-items: center; justify-content: center;
            padding: 0 20px; z-index: 1000;
            border-radius: 100px !important;
        }

        #start-button {
            width: 36px; height: 36px;
            border: 1px solid var(--primary-color);
            display: flex; justify-content: center; align-items: center;
            font-weight: bold;
            border-radius: 100% !important;
        }

        #start-menu.active {
            display: flex; opacity: 1;
            transform: translateX(-50%) translateY(0) scale(1);
        }

        #desktop { height: 100vh; padding: 40px; display: flex; gap: 30px; }

        .desktop-icon {
            width: 90px; height: 95px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 10px;
            border-radius: 20px !important;
        }

        .desktop-icon:hover {
            background: rgba(157, 0, 255, 0.1);
            border: 1px solid var(--primary-color);
        }

        .emoji-icon { font-size: 32px; }
        .desktop-icon span { font-size: 11px; color: var(--primary-color); }

        .menu-item {
            width: 80%; padding: 12px; font-size: 14px; 
            color: var(--primary-color);
            border-bottom: 1px solid rgba(157, 0, 255, 0.1);
            border-radius: 30px !important;
            margin-bottom: 5px;
            text-decoration: none;
            display: block;
        }
        
        .menu-item:hover { background: var(--primary-color); color: #000; }
    </style>
</head>
<body onclick="playClick();">

    <div id="fps-counter">FPS: 60</div>

    <div id="desktop">
        <div class="desktop-icon" onclick="window.open('https://google.com', '_blank')">
            <img src="https://www.google.com/favicon.ico" style="width:32px;">
            <span>Browser</span>
        </div>
        <div class="desktop-icon" onclick="window.open('https://grok.com', '_blank')">
            <div class="emoji-icon">🌙</div>
            <span>Grok</span>
        </div>
         <div class="desktop-icon" onclick="window.open('https://w3nt3rv3r5e.github.io/W3nt3rv3r5e/', '_blank')">
            <div class="emoji-icon">⚡</div>
            <span>Our Website</span>
         </div>
        
    <div id="taskbar">
        <div id="start-button" onclick="toggleStartMenu(event)">A</div>
    </div>

    
    <script>
        // System Sound Controls
        const clickSnd = document.getElementById('snd-click');
        const startupSnd = document.getElementById('snd-startup');

        function playClick() {
            clickSnd.currentTime = 0;
            clickSnd.play().catch(() => {}); // Catch block handles browser autoplay restrictions
        }

        // Play startup on initial load
        window.onload = () => {
            startupSnd.play().catch(() => {
                console.log("Startup audio blocked. User interaction required.");
            });
        };

        // UI Logic[cite: 1]
        function toggleStartMenu(e) {
            e.stopPropagation();
            playClick();
            document.getElementById('start-menu').classList.toggle('active');
        }

        // FPS Logic[cite: 1]
        let lastTime = performance.now();
        let frameCount = 0;
        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                document.getElementById('fps-counter').innerText = `FPS: ${frameCount}`;
                frameCount = 0;
                lastTime = now;
            }
            requestAnimationFrame(updateFPS);
        }
        requestAnimationFrame(updateFPS);
    </script>
</body>
</html>
