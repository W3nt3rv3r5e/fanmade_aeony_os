<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AeonyOS</title>
    <style>
        :root {
            --primary-color: #9d00ff;
            --bg-color: #000000; /* Pure Black */
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none;
            /* Restore Custom Cursor */
            cursor: url("assets/cursor.svg"), auto !important;
        }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: var(--bg-color);
            color: white; font-family: 'Segoe UI', sans-serif;
        }

        /* Desktop Layout */
        #desktop { 
            height: calc(100vh - 60px); padding: 30px; 
            display: flex; flex-wrap: wrap; align-content: flex-start; gap: 25px;
        }

        .desktop-icon {
            width: 90px; height: 100px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 8px;
            border-radius: 15px; transition: 0.3s;
        }

        .desktop-icon:hover { background: rgba(157, 0, 255, 0.2); }
        .emoji-icon { font-size: 35px; }
        .desktop-icon span { font-size: 12px; font-weight: 500; }

        /* Window System */
        .window {
            position: absolute; top: 50px; left: 50px;
            width: 80%; height: 70%;
            background: rgba(10, 0, 20, 0.95);
            border: 1px solid var(--primary-color);
            border-radius: 12px; display: none; flex-direction: column;
            box-shadow: 0 0 30px rgba(157, 0, 255, 0.3);
            z-index: 100;
        }

        .window.active { display: flex; }
        .window-header {
            padding: 10px 15px; background: rgba(157, 0, 255, 0.1);
            display: flex; justify-content: space-between; align-items: center;
        }

        .close-btn { color: #ff4444; cursor: pointer; font-weight: bold; }
        iframe { border: none; flex-grow: 1; border-radius: 0 0 12px 12px; }

        /* Taskbar */
        #taskbar {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            height: 50px; width: 300px;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid var(--primary-color);
            border-radius: 25px; display: flex; align-items: center;
            justify-content: space-around; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="desktop">
        <div class="desktop-icon" onclick="openApp('Grok', 'https://grok.com')">
            <div class="emoji-icon">🌙</div>
            <span>Grok</span>
        </div>
        <div class="desktop-icon" onclick="openApp('Game Jolt', 'https://gamejolt.com')">
            <div class="emoji-icon">⚡</div>
            <span>Game Jolt</span>
        </div>
        <div class="desktop-icon" onclick="openApp('Settings', 'apps/settings.html')">
            <div class="emoji-icon">⚙️</div>
            <span>Settings</span>
        </div>
    </div>

    <div id="app-window" class="window">
        <div class="window-header">
            <span id="window-title">App</span>
            <span class="close-btn" onclick="closeApp()">✕</span>
        </div>
        <iframe id="app-frame" src=""></iframe>
    </div>

    <div id="taskbar">
        <div onclick="location.reload()" style="cursor:pointer">🌀</div>
        <div onclick="closeApp()" style="cursor:pointer">🏠</div>
    </div>

    <script>
        function openApp(name, url) {
            document.getElementById('window-title').innerText = name;
            document.getElementById('app-frame').src = url;
            document.getElementById('app-window').classList.add('active');
        }

        function closeApp() {
            document.getElementById('app-window').classList.remove('active');
            document.getElementById('app-frame').src = '';
        }

        // Feature: Listen for messages from the Settings App
        window.addEventListener('message', (event) => {
            if (event.data.type === 'SET_COLOR') {
                document.documentElement.style.setProperty('--primary-color', event.data.value);
            }
            if (event.data.type === 'SET_BG') {
                document.body.style.background = event.data.value;
            }
        });
    </script>
</body>
</html>
