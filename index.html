<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AeonyOS - Zenith</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <style>
        /* [TOP POSITION] - Theme Variables & Industrial Reset */
        :root {
            --primary-color: #9d00ff; /* Neon Violet Default */
            --bg-dark: #0a0015;
        }

        * {
            cursor: url("cursor.svg"), auto !important;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--primary-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Taskbar Styling */
        #taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 45px;
            background: rgba(15, 0, 30, 0.95);
            border-top: 1px solid var(--primary-color);
            display: flex;
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
        }

        #start-button {
            width: 35px;
            height: 35px;
            border: 1px solid var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        #start-button:hover {
            background: var(--primary-color);
            color: #000;
        }

        /* Start Menu */
        #start-menu {
            position: fixed;
            bottom: 50px;
            left: 10px;
            width: 250px;
            height: 350px;
            background: rgba(10, 0, 20, 0.98);
            border: 1px solid var(--primary-color);
            display: none;
            flex-direction: column;
            padding: 10px;
            z-index: 1001;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .menu-item {
            padding: 10px;
            border-bottom: 1px solid rgba(157, 0, 255, 0.1);
            font-size: 14px;
            color: var(--primary-color);
        }

        .menu-item:hover {
            background: rgba(157, 0, 255, 0.1);
        }

        /* Context Menu */
        #context-menu {
            position: absolute;
            width: 180px;
            background: rgba(20, 0, 40, 0.98);
            border: 1px solid var(--primary-color);
            display: none;
            z-index: 2000;
        }
    </style>
</head>
<body oncontextmenu="return showContextMenu(event);" onclick="hideElements();">

    <!-- Startup Sound -->
    <audio id="startup-sound" src="sounds/startup.mp3" preload="auto"></audio>

    <!-- Desktop Area -->
    <div id="desktop" style="height: calc(100vh - 45px);"></div>

    <!-- Start Menu -->
    <div id="start-menu">
        <div class="menu-item" onclick="randomizeTheme();" style="font-weight: bold; border-bottom: 2px solid var(--primary-color);">Randomize Theme (Hex)</div>
        <div class="menu-item">Terminal</div>
        <div class="menu-item">File Explorer</div>
        <div class="menu-item">Settings</div>
        <div class="menu-item">Notepad</div>
        <div class="menu-item" onclick="location.reload();">Restart</div>
        <div class="menu-item" onclick="window.close();" style="color: #ff3366; margin-top: auto;">Shutdown</div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu">
        <div class="menu-item" onclick="location.reload();">Refresh</div>
        <div class="menu-item" onclick="randomizeTheme();">Random Theme</div>
        <div class="menu-item">Personalize</div>
        <div class="menu-item">New Project</div>
        <div class="menu-item">New Folder</div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div id="start-button" onclick="toggleStartMenu(event);">A</div>
        <div style="margin-left: auto; font-size: 12px; color: var(--primary-color);" id="clock">00:00</div>
    </div>

    <script>
        // System Theme Logic
        function randomizeTheme() {
            // Generate a random 6-digit hex code
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            
            // Apply to CSS Variable
            document.documentElement.style.setProperty('--primary-color', randomColor);
            
            // Visual confirmation on Start Button
            const btn = document.getElementById('start-button');
            btn.style.backgroundColor = randomColor;
            setTimeout(() => btn.style.backgroundColor = 'transparent', 200);

            console.log("AeonyOS Theme Updated: " + randomColor);
        }

        // System Core Logic
        window.onload = () => {
            const audio = document.getElementById('startup-sound');
            audio.play().catch(() => console.log("Interaction required for audio."));
            updateClock();
            setInterval(updateClock, 1000);
        };

        function toggleStartMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById('start-menu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function showContextMenu(e) {
            e.preventDefault();
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            return false;
        }

        function hideElements() {
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('context-menu').style.display = 'none';
        }

        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
        }
    </script>
</body>
</html>
