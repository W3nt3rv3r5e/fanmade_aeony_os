<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AeonyOS - Zenith</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <style>
        /* [TOP POSITION] - Theme Variables & Moga Cursor */
        :root {
            --primary-color: #9d00ff; /* Neon Violet Default */
            --bg-color: #0a0015;
            --menu-bg: rgba(20, 0, 40, 0.95);
        }

        * {
            cursor: url("cursor.svg"), auto !important;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            border-radius: 0px !important; /* Sharp Industrial Style */
            transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a0033 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Desktop Layout */
        #desktop {
            height: calc(100vh - 45px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        /* Desktop Shortcut Styling */
        .desktop-icon {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .desktop-icon:hover {
            background: rgba(157, 0, 255, 0.1);
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
        }

        .desktop-icon img {
            width: 32px;
            height: 32px;
        }

        .desktop-icon span {
            font-size: 11px;
            text-align: center;
            color: var(--primary-color);
        }

        /* UI Components: Taskbar, Menu, Context */
        #taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 45px;
            background: rgba(0, 0, 0, 0.85);
            border-top: 1px solid var(--primary-color);
            display: flex;
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
        }

        #start-menu, #context-menu {
            position: absolute;
            background: var(--menu-bg);
            border: 1px solid var(--primary-color);
            z-index: 2000;
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.3);
        }

        #start-menu {
            bottom: 50px;
            left: 10px;
            width: 250px;
            height: 350px;
            display: none;
            flex-direction: column;
            padding: 10px;
        }

        #context-menu {
            width: 180px;
            display: none;
        }

        .menu-item {
            padding: 10px 15px;
            font-size: 13px;
            color: var(--primary-color);
            border-bottom: 1px solid rgba(157, 0, 255, 0.2);
        }

        .menu-item:hover {
            background: var(--primary-color);
            color: #000;
        }

        #start-button {
            width: 35px;
            height: 35px;
            border: 1px solid var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
    </style>
</head>
<body oncontextmenu="return showContextMenu(event);" onclick="hideElements();">

    <!-- Startup Sound -->
    <audio id="startup-sound" src="sounds/startup.mp3" preload="auto"></audio>

    <!-- Desktop Area -->
    <div id="desktop">
        <!-- Web Browser Shortcut -->
        <div class="desktop-icon" onclick="openBrowser();">
            <img src="https://www.google.com/favicon.ico" alt="Browser">
            <span>Web Browser</span>
        </div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu">
        <div class="menu-item" onclick="randomizeTheme();" style="font-weight: bold;">Randomize Theme</div>
        <div class="menu-item">Terminal.exe</div>
        <div class="menu-item">File Explorer</div>
        <div class="menu-item" onclick="location.reload();">Refresh OS</div>
        <div class="menu-item" onclick="window.close();" style="color: #ff3366; margin-top: auto;">Shutdown</div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu">
        <div class="menu-item" onclick="location.reload();">Refresh</div>
        <div class="menu-item" onclick="randomizeTheme();">Random Theme</div>
        <div class="menu-item">New Folder</div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div id="start-button" onclick="toggleStartMenu(event);">A</div>
        <div style="margin-left: auto; font-size: 12px; color: var(--primary-color);" id="clock">00:00</div>
    </div>

    <script>
        // System Theme Randomizer
        function randomizeTheme() {
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            document.documentElement.style.setProperty('--primary-color', randomColor);
            console.log("AeonyOS Theme Updated: " + randomColor);
        }

        // Browser Navigation
        function openBrowser() {
            window.location.href = "https://www.google.com";
        }

        // Core UI Logic
        window.onload = () => {
            const audio = document.getElementById('startup-sound');
            audio.play().catch(() => {});
            updateClock();
            setInterval(updateClock, 1000);
        };

        function toggleStartMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById('start-menu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function showContextMenu(e) {
            e.preventDefault();
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            return false;
        }

        function hideElements() {
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('context-menu').style.display = 'none';
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0');
        }
    </script>
</body>
</html>
